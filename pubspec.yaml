name: fomo
description: An app for finding fun

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=2.17.3 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  font_awesome_flutter: 10.1.0
  google_maps_flutter: ^2.1.8
  provider: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/mapStyles/aubergine.json
    - assets/mapStyles/dark.json
    - assets/mapStyles/night.json
